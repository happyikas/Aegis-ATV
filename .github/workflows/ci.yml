name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Make every job offline-safe — no real keys checked into CI.
  AEGIS_EMBEDDING_PROVIDER: dummy
  AEGIS_JUDGE_PROVIDER: dummy
  AEGIS_SAFETY_PROVIDER: dummy
  # Node 24 opt-in for JavaScript-based actions (deadline 2026-06-02).
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  # Once Node 24 is the runner default, this line is a no-op and can
  # be removed.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Lint + typecheck — fast, runs on every push
  # ─────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python (uv-managed)
        run: uv python install 3.11

      - name: uv sync
        run: uv sync --frozen

      - name: ruff
        run: uv run ruff check .

      - name: mypy strict
        run: uv run mypy src

  # ─────────────────────────────────────────────────────────────────────
  # Unit + integration tests — single OS, multi-Python
  # ─────────────────────────────────────────────────────────────────────
  tests:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: uv sync
        run: uv sync --frozen

      - name: pytest
        run: uv run pytest -q --tb=short

      - name: Coverage (Python 3.11 only)
        if: matrix.python == '3.11'
        run: |
          uv run pytest --cov=aegis --cov-report=term-missing --cov-report=xml -q
          echo "coverage report written to coverage.xml"

      - name: Upload coverage to Codecov
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────
  # Docker build smoke — builds the image and curls /healthz
  # ─────────────────────────────────────────────────────────────────────
  docker-build:
    name: docker build + healthz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: aegis-atv:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot container
        run: |
          mkdir -p data keys
          docker run -d --name aegis-atv-ci \
            -p 8000:8000 \
            -e AEGIS_EMBEDDING_PROVIDER=dummy \
            -e AEGIS_JUDGE_PROVIDER=dummy \
            -e AEGIS_SAFETY_PROVIDER=dummy \
            -v "$(pwd)/data:/app/data" \
            -v "$(pwd)/keys:/app/keys" \
            aegis-atv:ci

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz; then
              echo
              echo "service up"
              exit 0
            fi
            sleep 1
          done
          echo "service did not come up in 30s"
          docker logs aegis-atv-ci
          exit 1

      - name: Smoke-test endpoints
        run: |
          set -euo pipefail
          for path in /healthz /admin/aid /forensic/replay /ham/stats /burnin-status /attestation; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000${path}")
            echo "  ${path}  HTTP ${code}"
            test "${code}" = "200"
          done

      - name: Container logs (always)
        if: always()
        run: docker logs aegis-atv-ci || true

      - name: Stop container
        if: always()
        run: docker stop aegis-atv-ci 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────
  # Demo end-to-end — runs the full agent_demo against the container
  # ─────────────────────────────────────────────────────────────────────
  demo-e2e:
    name: demo (5-call + M14 + M16 + M15)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: uv sync
        run: uv sync --frozen

      - name: docker compose up
        run: |
          mkdir -p data keys
          docker compose up -d --build
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/healthz && exit 0
            sleep 1
          done
          docker compose logs
          exit 1

      - name: Run agent_demo
        env:
          AEGIS_URL: http://localhost:8000
          AEGIS_DEMO_DEBUG: "1"
        run: uv run python -m demo.agent_demo

      - name: Stop
        if: always()
        run: docker compose down 2>/dev/null || true
