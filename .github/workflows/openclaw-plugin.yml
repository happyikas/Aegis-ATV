name: openclaw-plugin

on:
  push:
    branches: [main]
    paths:
      - "openclaw-plugin/**"
      - ".github/workflows/openclaw-plugin.yml"
  pull_request:
    paths:
      - "openclaw-plugin/**"
      - ".github/workflows/openclaw-plugin.yml"

jobs:
  build-and-test:
    name: tsc + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: openclaw-plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Vitest
        run: npm test
