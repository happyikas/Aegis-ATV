name: openclaw-plugin

on:
  push:
    branches: [main]
    paths:
      - "openclaw-plugin/**"
      - ".github/workflows/openclaw-plugin.yml"
  pull_request:
    paths:
      - "openclaw-plugin/**"
      - "src/aegis/api/evaluate.py"
      - ".github/workflows/openclaw-plugin.yml"

env:
  # Node 24 opt-in (deadline 2026-06-02). See release-pypi.yml for
  # the deprecation rationale link.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: tsc + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: openclaw-plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Vitest (unit)
        run: npm test

  e2e:
    name: e2e (plugin ↔ real Aegis sidecar)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AEGIS_EMBEDDING_PROVIDER: dummy
      AEGIS_JUDGE_PROVIDER: dummy
      AEGIS_SAFETY_PROVIDER: dummy
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: uv sync (Aegis sidecar deps)
        run: uv sync --frozen

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: openclaw-plugin/package-lock.json

      - name: npm ci
        working-directory: openclaw-plugin
        run: npm ci

      - name: vitest e2e
        working-directory: openclaw-plugin
        run: npm run test:e2e
