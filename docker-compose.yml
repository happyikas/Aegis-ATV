services:
  aegis:
    build: .
    image: aegis-mvp:dev
    container_name: aegis-mvp
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      AEGIS_AUDIT_DB: /app/data/audit.sqlite
      AEGIS_AUDIT_JSONL: /app/data/audit.jsonl
      AEGIS_INTENT_LOG_DB: /app/data/intent_log.sqlite
      AEGIS_COST_LEDGER_DB: /app/data/cost_attestation.sqlite
      AEGIS_COST_LEDGER_JSONL: /app/data/cost_attestation.jsonl
      # M15 — encrypted ATV journal (AES-256-GCM)
      AEGIS_JOURNAL_PATH: /app/data/journal.bin
      AEGIS_JOURNAL_DATA_KEY_PATH: /app/keys/journal_data.key
      # M16 — Hierarchical Agent Memory store
      AEGIS_HAM_DB: /app/data/ham.sqlite
      AEGIS_HAM_DATA_KEY_PATH: /app/keys/ham_data.key
      # Signing keys
      AEGIS_SIGNING_KEY_PATH: /app/keys/ed25519.pem
      AEGIS_PUBLIC_KEY_PATH: /app/keys/ed25519.pub
      AEGIS_COST_SIGNING_KEY_PATH: /app/keys/ed25519_cost.pem
      AEGIS_COST_PUBLIC_KEY_PATH: /app/keys/ed25519_cost.pub
      AEGIS_POLICY_DIR: /app/policies
    volumes:
      - ./data:/app/data
      - ./keys:/app/keys
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
